<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de Coma - RA Profesional</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        /* Eliminación total de interfaces de VR y escaneo */
        .a-enter-vr, .a-enter-ar, .mindar-ui-overlay, .mindar-ui-scanning, .a-loader-title { 
            display: none !important; 
        }
    </style>

    <script>
        // Componente para controlar la opacidad de los materiales del GLB
        AFRAME.registerComponent('gltf-opacity', {
            schema: { opacity: {type: 'number', default: 0} },
            init: function () {
                this.el.addEventListener('model-loaded', () => this.update());
            },
            update: function () {
                const mesh = this.el.getObject3D('mesh');
                if (!mesh) return;
                mesh.traverse((node) => {
                    if (node.isMesh && node.material) {
                        node.material.transparent = true;
                        node.material.opacity = this.data.opacity;
                        node.material.needsUpdate = true;
                    }
                });
            }
        });
    </script>
</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./logo-target.mind; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true, exposure: 1.2" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="logoGLB" src="EtadoLogRA.glb"></a-asset-item>
            <img id="entornoTexture" src="entorno_luz.jpg">
        </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity light="type: ambient; intensity: 1.8;"></a-entity>
        <a-entity light="type: directional; intensity: 1.2; position: 1 1 1"></a-entity>
        <a-entity light="type: directional; intensity: 1.2; position: -1 1 1"></a-entity>
        
        <a-sky src="#entornoTexture" visible="false"></a-sky>

        <a-entity id="targetGroup" mindar-image-target="targetIndex: 0">
            
            <a-gltf-model 
                id="modeloLogo"
                src="#logoGLB" 
                position="0 0 0.01" 
                rotation="0 0 0" 
                scale="0 0 0"
                gltf-opacity="opacity: 0"
                animation-mixer
                
                /* Animación de Escala */
                animation__scale="property: scale; to: 0.1 0.1 0.1; dur: 800; easing: easeOutBack; startEvents: iniciarEntrada"
                
                /* Animación de Opacidad */
                animation__fade="property: gltf-opacity.opacity; to: 1; dur: 800; easing: linear; startEvents: iniciarEntrada">
            </a-gltf-model>

        </a-entity>
        
    </a-scene>

    <script>
        const targetEntidad = document.querySelector('#targetGroup');
        const elModelo = document.querySelector('#modeloLogo');

        // Al detectar el logo físico
        targetEntidad.addEventListener("targetFound", () => {
            // Disparamos las animaciones definidas en el modelo
            elModelo.emit('iniciarEntrada');
        });

        // Al perder el logo de vista (opcional: reset para que vuelva a entrar al re-enfocar)
        targetEntidad.addEventListener("targetLost", () => {
            elModelo.setAttribute('scale', '0 0 0');
            elModelo.setAttribute('gltf-opacity', 'opacity', 0);
        });
    </script>

</body>
</html>
