        <a-sky src="#entornoTexture" visible="false"></a-sky>

        <a-entity id="targetEntidad" mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                id="modeloLogo"
                src="#logoGLB" 
                position="0 0 0.01" 
                rotation="0 0 0" 
                scale="0 0 0"
                visible="false"
                animation-mixer
                gltf-model-opaque
                mixin="mixinFadeIn mixinScaleIn">
            </a-gltf-model>
        </a-entity>
        
    </a-scene>

    <script>
        // Componente A-Frame para manejar la opacidad del modelo GLTF (necesario)
        AFRAME.registerComponent('gltf-model-opaque', {
            schema: {
                opaque: {type: 'number', default: 1}
            },
            init: function () {
                var el = this.el;
                el.addEventListener('model-loaded', function () {
                    var model = el.getObject3D('mesh');
                    if (model) {
                        model.traverse(function (node) {
                            if (node.isMesh && node.material) {
                                node.material.transparent = true;
                                node.material.opacity = el.getAttribute('gltf-model-opaque').opaque;
                                node.material.needsUpdate = true;
                            }
                        });
                    }
                });
            },
            update: function () {
                var el = this.el;
                var model = el.getObject3D('mesh');
                if (model) {
                    model.traverse(function (node) {
                        if (node.isMesh && node.material) {
                            node.material.opacity = el.getAttribute('gltf-model-opaque').opaque;
                            node.material.needsUpdate = true;
                        }
                    });
                }
            }
        });

        // Evento que se dispara al encontrar el logo (target index 0)
        const target = document.querySelector('#targetEntidad');
        const modelo = document.querySelector('#modeloLogo');

        target.addEventListener("targetFound", (event) => {
            // Hacemos visible el modelo (con escala 0 y opacidad 0)
            modelo.setAttribute('visible', 'true');
            // Lanzamos las animaciones de los mixins
            modelo.components.animation__fade.play();
            modelo.components.animation__scale.play();
        });

        // Opcional: Reiniciar el estado al perder el logo
        target.addEventListener("targetLost", (event) => {
             modelo.setAttribute('visible', 'false');
             modelo.setAttribute('scale', '0 0 0');
             modelo.setAttribute('gltf-model-opaque', 'opaque', 0);
             // Reiniciamos las animaciones para la próxima vez
             modelo.components.animation__fade.stop();
             modelo.components.animation__scale.stop();
        });
    </script>

</body>
</html>
