<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estado de Coma - RA con Brillo</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.2.0/dist/aframe-extras.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        /* Ocultamos cualquier interfaz de VR/AR para que quede limpio */
        .a-enter-vr, .a-enter-ar, .mindar-ui-overlay, .mindar-ui-scanning, .a-loader-title { 
            display: none !important; 
        }
    </style>
</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./logo-target.mind; uiScanning: no; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true, exposure: 1.2" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="logoGLB" src="EtadoLogRA.glb"></a-asset-item>
            <img id="entornoTexture" src="entorno_luz.jpg">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity light="type: ambient; intensity: 1.8;"></a-entity>
        
        <a-entity light="type: directional; intensity: 1.2; position: 1 1 1"></a-entity>
        
        <a-entity light="type: directional; intensity: 1.2; position: -1 1 1"></a-entity>

        <a-sky src="#entornoTexture" visible="false"></a-sky>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                src="#logoGLB" 
                position="0 0 0.01" 
                rotation="0 0 0" 
                scale="0.1 0.1 0.1"
                animation-mixer>
            </a-gltf-model>
        </a-entity>
        
    </a-scene>

</body>
</html>
