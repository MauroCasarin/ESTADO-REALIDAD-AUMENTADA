<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        /* Estilo para pantallas de carga o UI si fuera necesario */
    </style>
</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./logo-target.mind;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="logoJPG" src="Estado de Coma logo.jpg">
            <a-asset-item id="logoGLB" src="EtadoLogRA.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                src="#logoGLB" 
                rotation="0 0 0" 
                position="0 0 0" 
                scale="0.5 0.5 0.5"
                animation="property: rotation; to: 0 360 0; dur: 5000; easing: linear; loop: true">
            </a-gltf-model>
        </a-entity>
        
    </a-scene>

</body>
</html>
